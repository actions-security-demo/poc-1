version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      include:
        - '*'
      exclude:
        - react
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - '*'
        dependency-type: development
      production-dependencies:
        applies-to: version-updates
        patterns:
          - '*'
        dependency-type: production
      
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 5
      include:
        - '*'
      exclude:
        - react
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - '*'
        dependency-type: development
      production-dependencies:
        applies-to: version-updates
        patterns:
          - '*'
        dependency-type: production
